<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Köprü — AI Gateway</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --accent: #58a6ff; --green: #3fb950; --red: #f85149;
    --text: #c9d1d9; --muted: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    padding: 20px; max-width: 900px; margin: 0 auto;
  }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  header h1 { font-size: 24px; }
  .bridge { font-size: 32px; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 16px;
  }
  .card h2 { font-size: 16px; margin-bottom: 12px; color: var(--accent); }
  .provider {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .provider:last-child { border-bottom: none; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block; margin-right: 8px;
  }
  .ok { background: var(--green); }
  .bad { background: var(--red); }
  .model-list { font-size: 13px; color: var(--muted); }
  textarea, input, select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 10px; border-radius: 6px;
    font-family: inherit; font-size: 14px;
  }
  textarea { min-height: 80px; resize: vertical; margin-bottom: 8px; }
  button {
    background: var(--accent); color: #fff; border: none;
    padding: 10px 20px; border-radius: 6px; cursor: pointer;
    font-size: 14px; font-weight: 600;
  }
  button:hover { opacity: 0.9; }
  .response {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px; margin-top: 12px;
    min-height: 60px; white-space: pre-wrap; font-size: 14px;
  }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat { text-align: center; }
  .stat .num { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
  <header>
    <span class="bridge">🌉</span>
    <h1>Köprü</h1>
    <span style="color:var(--muted);font-size:13px;">AI Gateway</span>
  </header>

  <div class="card">
    <h2>📡 Provider Durumu</h2>
    <div id="providers"><p style="color:var(--muted)">Yükleniyor...</p></div>
  </div>

  <div class="card">
    <h2>🔀 Test Sorgusu</h2>
    <select id="model"></select>
    <textarea id="prompt" placeholder="Mesajını yaz...">Merhaba Köprü, nasılsın?</textarea>
    <button onclick="send()">Gönder</button>
    <div id="response" class="response"></div>
  </div>

  <div class="card">
    <h2>📊 İstatistikler</h2>
    <div class="stats" id="stats">
      <div class="stat"><div class="num" id="total">0</div><div class="label">Toplam İstek</div></div>
      <div class="stat"><div class="num" id="success">0</div><div class="label">Başarılı</div></div>
      <div class="stat"><div class="num" id="fallback">0</div><div class="label">Fallback</div></div>
    </div>
  </div>

<script>
async function loadProviders() {
  try {
    const res = await fetch('/api/providers');
    const data = await res.json();
    const el = document.getElementById('providers');
    const sel = document.getElementById('model');
    el.innerHTML = '';
    sel.innerHTML = '<option value="">Otomatik (fallback)</option>';
    for (const [name, info] of Object.entries(data)) {
      const dot = info.healthy ? 'ok' : 'bad';
      const status = info.healthy ? 'çalışıyor' : 'çökmüş';
      el.innerHTML += `<div class="provider">
        <span><span class="status-dot ${dot}"></span>${name}</span>
        <span class="model-list">${info.models.join(', ')}</span>
      </div>`;
      info.models.forEach(m => {
        sel.innerHTML += `<option value="${m}">${m} (${name})</option>`;
      });
    }
  } catch (e) {
    document.getElementById('providers').innerHTML =
      '<p style="color:var(--red)">Provider durumu alınamadı</p>';
  }
}

async function loadStats() {
  try {
    const res = await fetch('/api/status');
    const d = await res.json();
    document.getElementById('total').textContent = d.total_requests;
    document.getElementById('success').textContent = d.successful;
    document.getElementById('fallback').textContent = d.fallback_used;
  } catch (e) {}
}

async function send() {
  const model = document.getElementById('model').value;
  const prompt = document.getElementById('prompt').value;
  const resp = document.getElementById('response');
  resp.textContent = '⏳ Düşünüyor...';
  try {
    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: model, stream: false,
        messages: [{role: 'user', content: prompt}]
      })
    });
    const data = await res.json();
    if (data.error) {
      resp.textContent = '❌ ' + data.error.message;
    } else {
      resp.textContent = data.choices[0].message.content;
    }
    loadStats();
  } catch (e) {
    resp.textContent = '❌ Bağlantı hatası: ' + e;
  }
}

loadProviders();
loadStats();
setInterval(loadProviders, 30000);
</script>
</body>
</html>
