# Köprü Gateway — Yapılandırma
# API key'ler plaintext YAZILMAZ — ${ENV_VAR} ile env'den okunur.

default_model: ""

providers:
  # OpenRouter — 100+ model, ücretsiz katman mevcut
  - name: openrouter
    base_url: https://openrouter.ai/api/v1
    api_key: ${OPENROUTER_API_KEY}
    priority: 10
    enabled: true
    models:
      - deepseek/deepseek-chat
      - google/gemma-4-31b-it:free
      - meta-llama/llama-3.3-70b-instruct:free

  # OpenCode Zen — ücretsiz modeller (Cloudflare geçişli)
  - name: opencode-zen
    base_url: https://opencode.ai/zen/v1
    api_key: ${OPENCODE_ZEN_API_KEY}
    priority: 20
    enabled: true
    models:
      - mimo-v2.5-free
      - nemotron-3-ultra-free

  # Ollama — lokal/cloud model (gemma4:cloud)
  - name: ollama
    base_url: ${OLLAMA_BASE:-http://localhost:11434}/v1
    api_key: ""
    priority: 30
    enabled: true
    models:
      - gemma4:31b-cloud
